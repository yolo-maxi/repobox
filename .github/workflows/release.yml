name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: repobox-linux-x86_64
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: repobox-linux-aarch64
            use_cross: true
          - os: macos-15-intel
            target: x86_64-apple-darwin
            artifact: repobox-darwin-x86_64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: repobox-darwin-aarch64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p repobox-cli

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p repobox-cli

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/repobox ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/repobox-*; do
            name=$(basename "$dir")
            cp "$dir/$name" "release/$name"
          done

      - name: Generate checksums
        working-directory: release
        run: sha256sum repobox-* > checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/repobox-linux-x86_64
            release/repobox-linux-aarch64
            release/repobox-darwin-x86_64
            release/repobox-darwin-aarch64
            release/checksums.sha256
