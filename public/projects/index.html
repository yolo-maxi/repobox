<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects — repo.box</title>
<meta name="description" content="Live portfolio wall — what we're building at repo.box">
<meta property="og:title" content="Projects — repo.box">
<meta property="og:description" content="Live portfolio wall — what we're building at repo.box">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a1628; --surface: #0d1f35; --border: rgba(50,100,160,0.25);
  --text: #b8d4e3; --heading: #e8f4fd; --dim: #5a7a94;
  --accent: #4fc3f7; --green: #4caf50; --amber: #ffb74d; --purple: #9c27b0;
}
body { background:var(--bg); font-family:'JetBrains Mono',monospace; font-size:12px; line-height:20px; color:var(--text); min-height:100vh; cursor:crosshair; }
a { color:var(--accent); text-decoration:none; transition:opacity 0.2s; }
a:hover { opacity:0.8; }
.container { max-width:800px; margin:0 auto; padding:80px 40px 60px; }
.logo-dot { color:var(--accent); animation:dot-breathe 3s ease-in-out infinite; }
@keyframes dot-breathe {
  0%,100% { text-shadow:0 0 4px var(--accent); opacity:0.85; }
  50% { text-shadow:0 0 12px var(--accent),0 0 24px rgba(79,195,247,0.4); opacity:1; }
}
.stats-bar { display:flex; gap:24px; margin-bottom:32px; padding:16px 20px; background:var(--surface); border:1px solid var(--border); border-radius:6px; flex-wrap:wrap; }
.stat-item { display:flex; flex-direction:column; gap:2px; }
.stat-value { font-size:24px; font-weight:700; color:var(--heading); line-height:1; }
.stat-label { font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--dim); }
.filter-bar { display:flex; gap:8px; margin-bottom:24px; align-items:center; }
.filter-label { font-size:10px; text-transform:uppercase; letter-spacing:0.12em; color:var(--dim); margin-right:4px; }
.filter-btn { font-family:inherit; font-size:11px; padding:4px 12px; border:1px solid var(--border); background:transparent; color:var(--dim); border-radius:3px; cursor:pointer; transition:all 0.2s; }
.filter-btn:hover { border-color:var(--accent); color:var(--accent); }
.filter-btn.active { background:rgba(79,195,247,0.12); color:var(--accent); border-color:rgba(79,195,247,0.3); }
.projects-grid { display:flex; flex-direction:column; gap:16px; }
.project-card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:20px 24px; transition:transform 0.2s,border-color 0.3s; }
.project-card:hover { transform:translateY(-1px); border-color:rgba(79,195,247,0.35); }
.card-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.card-name { font-weight:700; font-size:16px; color:var(--heading); }
.card-name a { color:inherit; }
.card-name a:hover { color:var(--accent); }
.status-badge { font-size:10px; padding:2px 8px; border-radius:2px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; }
.status-active { background:rgba(79,195,247,0.12); color:var(--accent); }
.status-shipped { background:rgba(76,175,80,0.12); color:var(--green); }
.status-concept { background:rgba(156,39,176,0.12); color:var(--purple); }
.card-desc { color:var(--text); margin-bottom:12px; font-size:12px; line-height:18px; }
.progress-bar { height:4px; background:rgba(50,100,160,0.15); border-radius:2px; overflow:hidden; display:flex; margin-bottom:10px; }
.progress-done { background:var(--green); transition:width 0.6s; }
.progress-active { background:var(--accent); transition:width 0.6s; }
.progress-ideas { background:rgba(90,122,148,0.3); transition:width 0.6s; }
.card-stats { display:flex; gap:16px; font-size:11px; color:var(--dim); flex-wrap:wrap; }
.card-stats .done-count { color:var(--green); }
.card-stats .active-count { color:var(--accent); }
.card-stats .blocked-count { color:var(--amber); }
.reg-mark { position:fixed; width:20px; height:20px; z-index:100; pointer-events:none; }
.reg-mark::before,.reg-mark::after { content:''; position:absolute; background:rgba(79,195,247,0.25); }
.reg-mark::before { width:1px; height:20px; left:50%; }
.reg-mark::after { width:20px; height:1px; top:50%; }
.reg-tl { top:8px; left:8px; } .reg-tr { top:8px; right:8px; } .reg-bl { bottom:8px; left:8px; } .reg-br { bottom:8px; right:8px; }
footer { background:#060e1a; border-top:1px solid var(--border); padding:40px; text-align:center; color:var(--dim); font-size:11px; }
@media (max-width:640px) { .container { padding:40px 20px; } }
</style>
</head>
<body>
<div class="reg-mark reg-tl"></div><div class="reg-mark reg-tr"></div><div class="reg-mark reg-bl"></div><div class="reg-mark reg-br"></div>
<div class="container">
  <a href="/" style="font-size:12px;color:var(--dim);display:inline-block;margin-bottom:32px;">← repo.box</a>
  <header style="margin-bottom:32px;">
    <div style="font-size:40px;line-height:1.2;font-weight:700;margin-bottom:8px;">repo<span class="logo-dot">.</span>box <span style="font-size:0.45em;color:var(--dim);font-weight:400">/ projects</span></div>
    <p style="color:var(--dim);font-size:13px;max-width:460px;">Live portfolio wall. Auto-generated from kanban boards.</p>
  </header>
  <div class="stats-bar" id="stats-bar">
    <div class="stat-item"><span class="stat-value" id="stat-total">—</span><span class="stat-label">Projects</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-tasks">—</span><span class="stat-label">Tasks</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-shipped">—</span><span class="stat-label">Shipped</span></div>
    <div class="stat-item"><span class="stat-value" id="stat-active">—</span><span class="stat-label">In flight</span></div>
  </div>
  <div class="filter-bar">
    <span class="filter-label">Show:</span>
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="shipped">Shipped</button>
    <button class="filter-btn" data-filter="concept">Concept</button>
  </div>
  <div class="projects-grid" id="grid"></div>
</div>
<footer>
  <div>© 2026 repo.box — Live data from kanban boards</div>
  <div style="margin-top:8px;"><a href="/">Home</a> · <a href="/blog">Blog</a></div>
</footer>
<script>
let data=[], filter='all';
const urls={cabin:'https://cabin.team',sss:'https://sss.repo.box',oceangram:'https://oceangram.repo.box',rikai:'https://rikai.chat',repobox:'https://repo.box',supstrategy:'https://supstrategy.repo.box',botfight:'https://prompster.club',thepulse:'https://streme.fun'};
function relDate(s){if(!s||s==='unknown')return'no date';const d=new Date(s+'T00:00:00'),diff=Math.floor((Date.now()-d)/864e5);if(diff===0)return'today';if(diff===1)return'yesterday';if(diff<7)return diff+'d ago';if(diff<30)return Math.floor(diff/7)+'w ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function render(){
  const f=filter==='all'?data:data.filter(p=>p.status===filter);
  document.getElementById('stat-total').textContent=data.length;
  document.getElementById('stat-tasks').textContent=data.reduce((s,p)=>s+p.tasks.total,0);
  document.getElementById('stat-shipped').textContent=data.reduce((s,p)=>s+p.tasks.done,0);
  document.getElementById('stat-active').textContent=data.reduce((s,p)=>s+p.tasks.active,0);
  if(!f.length){document.getElementById('grid').innerHTML='<div style="color:var(--dim);padding:40px 0;text-align:center;">No projects match this filter.</div>';return;}
  document.getElementById('grid').innerHTML=f.map(p=>{
    const t=p.tasks,pD=t.total?Math.round(t.done/t.total*100):0,pA=t.total?Math.round(t.active/t.total*100):0,pI=Math.max(0,100-pD-pA);
    const url=p.url||urls[p.filename],nm=url?'<a href="'+url+'" target="_blank">'+p.name+'</a>':p.name;
    let st='';
    if(t.done)st+='<span class="done-count">'+t.done+' shipped</span>';
    if(t.active)st+='<span class="active-count">'+t.active+' active</span>';
    if(t.blocked)st+='<span class="blocked-count">'+t.blocked+' blocked</span>';
    if(t.ideas)st+='<span>'+t.ideas+' ideas</span>';
    st+='<span>updated '+relDate(p.last_update)+'</span>';
    return '<div class="project-card"><div class="card-header"><span class="card-name">'+nm+'</span><span class="status-badge status-'+p.status+'">'+p.status+'</span></div><div class="card-desc">'+p.description+'</div>'+(t.total?'<div class="progress-bar"><div class="progress-done" style="width:'+pD+'%"></div><div class="progress-active" style="width:'+pA+'%"></div><div class="progress-ideas" style="width:'+pI+'%"></div></div>':'')+'<div class="card-stats">'+st+'</div></div>';
  }).join('');
}
document.querySelectorAll('.filter-btn').forEach(b=>b.addEventListener('click',e=>{document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));e.target.classList.add('active');filter=e.target.dataset.filter;render();}));
fetch('/data/portfolio.json').then(r=>r.json()).then(d=>{data=d;render();}).catch(()=>{document.getElementById('grid').innerHTML='<div style="color:#ef5350;padding:20px;">Failed to load portfolio data.</div>';});
</script>
</body>
</html>
