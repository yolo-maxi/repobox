groups:
  founders:
    - evm:0xAAA0000000000000000000000000000000000001
  agents:
    - evm:0xBBB0000000000000000000000000000000000002

permissions:
  default: deny
  rules:
    - founders own >*
    - agents push >feature/**
    - agents branch >feature/**
    - agents edit * >feature/**
    - agents create ./src/**
    - "* read >*"