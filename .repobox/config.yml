# repo.box — permission config for the repo.box project itself
# Dogfooding our own creation 🪸

groups:
  founders:
    - evm:0xDbbAfc2a00175D0cDDFDF130EFc9FA0fb61d2048  # Ocean
    - evm:0x69C2920CA309577bcd79e4e6e3afdda93287Cc8b  # Fran

  agents:
    - evm:0xAAc050Ca4FB723bE066E7C12290EE965C84a4a00  # Claude
    - evm:0x82240a161Fea724D059a74F948C8E18674c0fA09  # Codex

  reviewers:
    members:
      - evm:0xF053A15C36f1FbCC2A281095e6f1507ea1EFc931
    includes:
      - founders

permissions:
  default: deny
  rules:
    # Founders — full control
    - founders own >*

    # Agents — feature branches only, no config access
    - agents push >feature/**
    - agents create >feature/**
    - agents edit * >feature/**
    - agents append ./CHANGELOG.md
    - agents not edit .repobox/config.yml

    # Reviewers can merge feature branches into main
    - reviewers merge >main
